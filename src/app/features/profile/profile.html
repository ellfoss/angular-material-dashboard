<div class="profile-header">
  <img src="assets/images/header-background.png" alt="" />
  <span class="profile-header-timestamp">17.05.2021 4:34PM</span>
</div>

<div class="profile-card">
  <div class="profile-row">
    <img class="profile-avatar" src="assets/images/image-profilepic.png" alt="Richard Davis" />
    <div class="profile-identity">
      <h6 class="profile-name">Richard Davis</h6>
      <p class="profile-role">CEO / Co-Founder</p>
    </div>
    <app-tabs [tabs]="profileTabs" />
  </div>

  <div class="info-row">
    <app-platform-settings />
    <div class="col-divider"></div>
    <app-profile-info />
    <div class="col-divider"></div>
    <app-conversations />
  </div>

  <app-projects />
</div>
