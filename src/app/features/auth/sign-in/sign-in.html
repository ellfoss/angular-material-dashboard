<div class="card">
  <div class="card-header">
    <h5 class="title">Sign In</h5>
    <div class="socials">
      <button class="social-btn" type="button">
        <img src="assets/images/facebook-white.svg" alt="Facebook" />
      </button>
      <button class="social-btn" type="button">
        <img src="assets/images/github-white.svg" alt="GitHub" />
      </button>
      <button class="social-btn" type="button">
        <img src="assets/images/google-white.svg" alt="Google" />
      </button>
    </div>
  </div>
  <div class="card-body">
    <input class="input" type="email" placeholder="Email" />
    <input class="input" type="password" placeholder="Current password" />
    <div class="remember-row">
      <app-toggle />
      <span class="remember-label">Remember me</span>
    </div>
    <button class="sign-in-btn" type="submit">SIGN IN</button>
    <p class="signup-text">
      Don't have an account? <a class="signup-link" href="/sign-up">Sign Up</a>
    </p>
  </div>
</div>
