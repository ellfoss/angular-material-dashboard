<div class="page">
  <div class="image-panel">
    <img class="illustration" src="assets/images/image-illustrator.png" alt="Sign Up" />
  </div>
  <div class="form-panel">
    <div class="form-wrapper">
      <h4 class="title">Sign Up</h4>
      <p class="subtitle">Enter your email and password to register</p>
      <input class="input" type="text" placeholder="Name" />
      <input class="input" type="email" placeholder="Email" />
      <input class="input" type="password" placeholder="Password" />
      <div class="agree-row">
        <app-toggle />
        <span class="agree-label">
          I agree to the <a class="agree-link" href="#">Terms and Conditions</a>
        </span>
      </div>
      <button class="sign-up-btn" type="submit">SIGN UP</button>
      <p class="signin-text">
        Already have an account? <a class="signin-link" href="/sign-in">Sign In</a>
      </p>
    </div>
  </div>
</div>
