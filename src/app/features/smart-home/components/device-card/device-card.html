<div class="card">
  <div class="card-top">
    <span class="state-label">{{ device().active ? 'On' : 'Off' }}</span>
    <span class="toggle-hit" (click)="toggle.emit()">
      <app-toggle [checked]="device().active" />
    </span>
  </div>
  <div class="card-body">
    <div class="device-image-wrap">
      <img class="device-image" [src]="device().image" [alt]="device().name" />
    </div>
    <p class="device-name">{{ device().name }}</p>
    <p class="device-status">{{ device().status }}</p>
  </div>
</div>
