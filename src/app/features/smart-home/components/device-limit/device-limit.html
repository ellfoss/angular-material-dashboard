<div class="card">
  <div class="section-header">
    <h6 class="section-title">Device limit</h6>
  </div>
  <div class="content">
    <div class="gauge-wrapper">
      <svg viewBox="0 0 200 185" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M 20 90 A 80 80 0 0 0 180 90"
          fill="none"
          stroke="#e9eaed"
          stroke-width="8"
          stroke-linecap="round"
        />
        <path
          [attr.d]="progressArcD"
          fill="none"
          stroke="url(#gaugeGradient)"
          stroke-width="8"
          stroke-linecap="round"
        />
        <defs>
          <linearGradient id="gaugeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#e93b77" />
            <stop offset="100%" stop-color="#da1f63" />
          </linearGradient>
        </defs>
        <circle
          [attr.cx]="progressEndX"
          [attr.cy]="progressEndY"
          r="5"
          fill="white"
          stroke="#e91f63"
          stroke-width="2"
        />
        <text x="100" y="100" text-anchor="middle" class="gauge-value">{{ limit.value }}°C</text>
        <text x="20" y="112" text-anchor="middle" class="gauge-range">{{ limit.min }}°C</text>
        <text x="180" y="112" text-anchor="middle" class="gauge-range">{{ limit.max }}°C</text>
      </svg>
    </div>
    <div class="info">
      <div class="info-row">
        <span class="info-dot red"></span>
        <div>
          <p class="info-label">Current Temperature</p>
          <p class="info-value">{{ limit.temperature }}°C</p>
        </div>
      </div>
      <div class="info-row">
        <span class="info-dot dark"></span>
        <div>
          <p class="info-label">Humidity</p>
          <p class="info-value">{{ limit.humidity }}°C</p>
        </div>
      </div>
    </div>
  </div>
</div>
