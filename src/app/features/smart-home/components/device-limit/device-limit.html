<div class="section-header">
  <h6 class="section-title">Device limit</h6>
</div>
<div class="content">
  <div class="gauge-wrapper">
    <div class="gauge-chart">
      <app-chart [config]="chartConfig" />
      <div class="gauge-center">
        <p class="gauge-value">{{ limit.value }}<span class="gauge-unit">°C</span></p>
      </div>
    </div>
    <div class="gauge-labels">
      <span class="gauge-range">{{ limit.min }}°C</span>
      <span class="gauge-range gauge-title">Temperature</span>
      <span class="gauge-range">{{ limit.max }}°C</span>
    </div>
  </div>
  <div class="info">
    <div class="info-row">
      <span class="info-label">Current Temperature</span>
      <span class="info-value">{{ limit.temperature }}°C</span>
    </div>
    <div class="info-row">
      <span class="info-label">Humidity</span>
      <span class="info-value">{{ limit.humidity }}%</span>
    </div>
  </div>
</div>
