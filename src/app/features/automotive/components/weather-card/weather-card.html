<div class="left">
  <span class="weather-label">Weather Today</span>
  <span class="city-temp">{{ weather().city }} — {{ weather().temperature }}°C</span>
</div>
<div class="right">
  <img class="weather-icon" src="assets/images/weather-sunny.png" alt="Sunny" />
  <span class="condition">{{ weather().condition }}</span>
</div>
